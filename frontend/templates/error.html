{% extends "base.html" %}

{% block title %}{{ code }} - DevJournal{% endblock %}

{% block content %}
<div class="error-card">
    <h1>{{ code }}</h1>
    <p>{{ message }}</p>
    <a href="{{ url_for('article.list_articles') }}" class="back-link">
        {{ icon('home') }}
        <span>{{ _('Return to home') }}</span>
    </a>
</div>
{% endblock %}
