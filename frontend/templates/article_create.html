{% extends "base.html" %}

{% block title %}Write an Article - DevJournal{% endblock %}

{% from "macros/icons.html" import icon %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('assets', filename='css/article.css') }}">
{% endblock %}

{% block content %}
    <div class="article-edit-view">
        <header class="detail-header">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link detail-back-link">
                {{ icon('arrow_back') }}
                <span>Back to articles</span>
            </a>
        </header>

        <div class="article-form-container">
            <div id="root" data-page="create"></div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
<script defer src="{{ url_for('assets', filename='scripts/code-copy.js') }}"></script>
{% endblock %}
