{% extends "base.html" %}

{% block title %}Sign In - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="user-card account-card">
    <div class="account-header">
        <h1 class="account-title">Welcome Back</h1>
        <p class="account-subtitle">Access your developer journal accounts.</p>
    </div>

    <form action="{{ url_for('auth.login') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" placeholder="dev_username" autocomplete="username" required>
        </div>
        <div class="form-group account-form-group">
            <label for="login-password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" class="password-toggle material-symbols-outlined" aria-label="Toggle password visibility" aria-pressed="false">visibility</button>
            </div>
        </div>
        <button type="submit" class="full-width">Sign In</button>
    </form>

    <hr>

    <div class="account-footer">
        <p class="account-subtitle">New to the system ?</p>
        <a href="{{ url_for('registration.register') }}" class="btn btn-secondary full-width">Create an account</a>
        
        <div class="account-footer-link">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link account-link-center">
                <span class="material-symbols-outlined">home</span>
                <span>Return to home</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
