{% extends "base.html" %}

{% block title %}Edit Article - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/article.css') }}">
{% endblock %}

{% block content %}
    <header>
        <a href="{{ url_for('article.read_article', article_id=article.article_id) }}" class="pagination-link">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to articles</span>
        </a>
    </header>

    <div class="article-form-container">
        <div id="root" data-page="edit" data-article-id="{{ article.article_id }}"></div>
    </div>
{% endblock %}
