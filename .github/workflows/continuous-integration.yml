name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Python CI, Migrations, Tests and Lint
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql://${{ secrets.TEST_POSTGRES_USER }}:${{ secrets.TEST_POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.TEST_POSTGRES_DB }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      TEST_ARGON2_TIME_COST: ${{ secrets.ARGON2_TIME_COST }}
      TEST_ARGON2_MEMORY_COST: ${{ secrets.ARGON2_MEMORY_COST }}
      TEST_ARGON2_PARALLELISM: ${{ secrets.ARGON2_PARALLELISM }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run lint
        run: poetry run ruff check .

      - name: Run type check
        run: poetry run pyright

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/migrations:/flyway/sql \
            flyway/flyway:11 \
            -url="jdbc:postgresql://localhost:5432/${{ secrets.TEST_POSTGRES_DB }}" \
            -user="${{ secrets.TEST_POSTGRES_USER }}" \
            -password="${{ secrets.TEST_POSTGRES_PASSWORD }}" \
            migrate

      - name: Run tests
        run: poetry run pytest tests/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend
