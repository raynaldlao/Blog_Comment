services:
  db_prod:
    image: postgres:18
    container_name: blog_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  db_test:
    image: postgres:18
    container_name: blog_db_test
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TEST_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  flyway_prod:
    image: flyway/flyway:11
    container_name: flyway_prod
    command: >
      -url=jdbc:postgresql://db_prod:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD}
      -connectRetries=10 migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db_prod

  flyway_test:
    image: flyway/flyway:11
    container_name: flyway_test
    command: >
      -url=jdbc:postgresql://db_test:5432/${TEST_POSTGRES_DB}
      -user=${TEST_POSTGRES_USER} -password=${TEST_POSTGRES_PASSWORD}
      -connectRetries=10 migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db_test

volumes:
  pgdata_prod:
  pgdata_test:
