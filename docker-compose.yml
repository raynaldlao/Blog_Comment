services:
  db:
    image: postgres:18
    container_name: blog_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TEST_POSTGRES_DB: ${TEST_POSTGRES_DB}
      TEST_POSTGRES_USER: ${TEST_POSTGRES_USER}
      TEST_POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro

  flyway_prod:
    image: flyway/flyway
    container_name: flyway_prod
    command: >
      -url=jdbc:postgresql://db:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD}
      -connectRetries=10 migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db

  flyway_test:
    image: flyway/flyway
    container_name: flyway_test
    command: >
      -url=jdbc:postgresql://db:5432/${TEST_POSTGRES_DB}
      -user=${TEST_POSTGRES_USER} -password=${TEST_POSTGRES_PASSWORD}
      -connectRetries=10 migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db

volumes:
  pgdata:
