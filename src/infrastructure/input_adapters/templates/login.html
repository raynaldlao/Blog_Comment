{% extends "base.html" %}

{% block title %}Sign In - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-card">
    <h1 style="font-size: var(--font-headline-md); margin-bottom: var(--spacing-sm);">Welcome Back</h1>
    <p style="color: var(--on-surface-variant); font-size: 14px; margin-bottom: var(--spacing-lg);">Access your developer journal accounts.</p>

    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="dev_username" required>
        </div>
        <div class="form-group" style="margin-bottom: var(--spacing-lg);">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" style="width: 100%;">Sign In</button>
    </form>

    <hr>

    <div class="footer">
        <p style="font-size: 14px; margin-bottom: var(--spacing-md);">New to the system?</p>
        <a href="{{ url_for('registration.register') }}" class="btn btn-secondary" style="width: 100%;">Create an account</a>
        
        <p style="margin-top: var(--spacing-lg);">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link" style="justify-content: center;">
                <span class="material-symbols-outlined">home</span>
                <span>Return to home</span>
            </a>
        </p>
    </div>
</div>
{% endblock %}
