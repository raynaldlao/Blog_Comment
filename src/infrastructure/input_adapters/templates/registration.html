{% extends "base.html" %}

{% block title %}Sign Up - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-card">
    <div class="account-header">
        <h1 class="account-title">Join DevJournal</h1>
        <p class="account-subtitle">Start your technical blog in seconds.</p>
    </div>

    <form action="{{ url_for('registration.register') }}" method="POST">
        <div class="form-group">
            <label for="username">Choose Username</label>
            <input type="text" id="username" name="username" placeholder="dev_username" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="dev@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-group account-form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="account-btn-full">Create Account</button>
    </form>

    <hr>

    <div class="account-footer">
        <p class="account-subtitle">Already have an account?</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary account-btn-full">Sign In instead</a>
        
        <p class="account-header">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link account-link-center">
                <span class="material-symbols-outlined">home</span>
                <span>Return to home</span>
            </a>
        </p>
    </div>
</div>
{% endblock %}
