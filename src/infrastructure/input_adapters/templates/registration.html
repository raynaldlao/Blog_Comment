{% extends "base.html" %}

{% block title %}Sign Up - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="user-card account-card">
    <div class="account-header">
        <h1 class="account-title">Join DevJournal</h1>
        <p class="account-subtitle">Start your technical blog in seconds.</p>
    </div>

    <form action="{{ url_for('registration.register') }}" method="POST">
        <div class="form-group">
            <label for="registration-username">Choose Username</label>
            <input type="text" id="registration-username" name="username" placeholder="dev_username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="registration-email">Email Address</label>
            <input type="email" id="registration-email" name="email" placeholder="dev@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="registration-password">Password</label>
            <input type="password" id="registration-password" name="password" placeholder="••••••••" autocomplete="new-password" required>
        </div>
        <div class="form-group account-form-group">
            <label for="registration-confirm-password">Confirm Password</label>
            <input type="password" id="registration-confirm-password" name="confirm_password" placeholder="••••••••" autocomplete="new-password" required>
        </div>
        <button type="submit" class="full-width">Create Account</button>
    </form>

    <hr>

    <div class="account-footer">
        <p class="account-subtitle">Already have an account?</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary full-width">Sign In instead</a>
        
        <div class="account-footer-link">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link account-link-center">
                <span class="material-symbols-outlined">home</span>
                <span>Return to home</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
