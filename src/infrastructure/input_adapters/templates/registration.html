{% extends "base.html" %}

{% block title %}Sign Up - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/registration.css') }}">
{% endblock %}

{% block content %}
<div class="registration-card">
    <h1 style="font-size: var(--font-headline-md); margin-bottom: var(--spacing-sm);">Join DevJournal</h1>
    <p style="color: var(--on-surface-variant); font-size: 14px; margin-bottom: var(--spacing-lg);">Start your technical blog in seconds.</p>

    <form action="{{ url_for('registration.register') }}" method="POST">
        <div class="form-group">
            <label for="username">Choose Username</label>
            <input type="text" id="username" name="username" placeholder="dev_username" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="dev@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-group" style="margin-bottom: var(--spacing-lg);">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>
        <button type="submit" style="width: 100%;">Create Account</button>
    </form>

    <hr>

    <div class="footer">
        <p style="font-size: 14px; margin-bottom: var(--spacing-md);">Already have an account?</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary" style="width: 100%;">Sign In instead</a>
        
        <p style="margin-top: var(--spacing-lg);">
            <a href="{{ url_for('article.list_articles') }}" class="pagination-link" style="justify-content: center;">
                <span class="material-symbols-outlined">home</span>
                <span>Return to home</span>
            </a>
        </p>
    </div>
</div>
{% endblock %}
