{% extends "base.html" %}

{% block title %}Write an Article - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/article.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <header class="page-header">
        <a href="{{ url_for('article.list_articles') }}" class="pagination-link">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to articles</span>
        </a>
    </header>

    <div class="article-form-container">
        <h1 class="header-h1">Write your story</h1>

        <form action="{{ url_for('article.create_article') }}" method="POST">
            <div class="form-group">
                <label for="article-create-title">Article Title</label>
                <input type="text" id="article-create-title" name="title" placeholder="A catchy title..." required minlength="3" maxlength="150">
            </div>
            <div class="form-group">
                <label for="article-create-content">Content</label>
                <textarea id="article-create-content" name="content" placeholder="Share your thoughts here..." required minlength="10"></textarea>
            </div>
            <div class="article-form-actions">
                <a href="{{ url_for('article.list_articles') }}" class="btn btn-sm btn-secondary article-form-btn">Cancel</a>
                <button type="submit" class="btn btn-sm article-form-btn">Publish Article</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
