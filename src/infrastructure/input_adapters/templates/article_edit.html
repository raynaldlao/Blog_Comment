{% extends "base.html" %}

{% block title %}Edit Article - DevJournal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/article.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <header class="page-header">
        <a href="{{ url_for('article.read_article', article_id=article.article_id) }}" class="pagination-link">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to articles</span>
        </a>
    </header>

    <div class="article-form-container">
        <h1 class="header-h1">Edit Article</h1>

        <form action="{{ url_for('article.update_article', article_id=article.article_id) }}" method="POST">
            <div class="form-group">
                <label for="article-edit-title">Article Title</label>
                <input type="text" id="article-edit-title" name="title" value="{{ article.article_title }}" required minlength="3" maxlength="150">
            </div>
            <div class="form-group">
                <label for="article-edit-content">Content</label>
                <textarea id="article-edit-content" name="content" required minlength="10">{{ article.article_content }}</textarea>
            </div>
            <div class="article-form-actions">
                <a href="{{ url_for('article.read_article', article_id=article.article_id) }}" class="btn btn-sm btn-secondary article-form-btn">Cancel</a>
                <button type="submit" class="btn btn-sm article-form-btn">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
